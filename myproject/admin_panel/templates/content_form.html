{% extends 'adminlte/base.html' %}
{% block title %}Content Form{% endblock %}
{% block content %}
<h1>{% if object %}Edit{% else %}Create{% endif %} Content</h1>
<form method="post">{% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'admin_panel:content_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
